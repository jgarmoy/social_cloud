version: 2

snapshots:

  - name: snp_perfil_social
    description: >
      Historial de cambios de perfiles sociales (SCD Type 2).
      Captura variaciones en el estado del perfil: activaciones, desactivaciones,
      cambios de nombre de usuario y reasignaciones de empresa.
      La clave única es codigo_perfil_social (perfil_id en staging).
    config:
      target_schema: snapshots
      unique_key: id_perfil_social
      strategy: timestamp
      updated_at: _fivetran_synced 
      invalidate_hard_deletes: true
    columns:
      - name: id_perfil_social
        data_type: varchar
        description: Clave surrogate generada desde username + plataforma.

      - name: codigo_perfil_social
        data_type: varchar
        description: Clave natural del perfil. Clave única del snapshot.

      - name: id_empresa
        data_type: varchar
        description: FK hacia int_empresa. Monitorizado para detectar reasignaciones.

      - name: id_red_social
        data_type: varchar
        description: FK hacia int_red_social. Monitorizado para detectar cambios de plataforma.

      - name: nombre_usuario
        data_type: varchar
        description: Handle del perfil. Monitorizado para detectar cambios de nombre.

      - name: fecha_creacion
        data_type: date
        description: Fecha de creación del perfil en la plataforma.

      - name: activo
        data_type: boolean
        description: Estado del perfil. Un cambio a false genera una nueva versión en el snapshot.

      - name: dbt_scd_id
        data_type: varchar
        description: Identificador único de cada versión del registro. Generado por dbt.

      - name: dbt_updated_at
        data_type: timestamp_ntz
        description: Timestamp en que dbt detectó el cambio que generó esta versión.

      - name: dbt_valid_from
        data_type: timestamp_ntz
        description: Inicio del período de validez de esta versión.

      - name: dbt_valid_to
        data_type: timestamp_ntz
        description: >
          Fin del período de validez. NULL indica registro vigente.
          En gold se expone como valido_hasta y se deriva es_vigente desde este campo.