version: 2

models:

  # ════════════════════════════════════════════════════════════
  # NORMALIZACIÓN DE AUDIENCIA DEMOGRÁFICA
  # ════════════════════════════════════════════════════════════

  - name: int_audiencia_demografica
    description: >
      Unificación de los tres bloques de audiencia demográfica (TikTok, Instagram, YouTube)
      en una estructura única y normalizada. Cada fila representa un segmento demográfico
      (género × edad × país) para un perfil en una fecha de snapshot concreta.
      La plataforma se infiere desde el handle (tk_handle / ig_username / yt_handle),
      no desde la columna de plataforma de la fuente, que puede venir sucia.
      Se descartan filas donde no se puede identificar username, plataforma o fecha_snapshot.
    columns:
      - name: empresa_id
        data_type: varchar
        description: Identificador de la empresa propietaria del perfil.
        data_tests:
          - not_null

      - name: perfil_id
        data_type: varchar
        description: Identificador del perfil social proveniente de la fuente.
        data_tests:
          - not_null

      - name: username
        data_type: varchar
        description: Handle del perfil en la plataforma, sin el prefijo '@'. Coalesce de tk_handle, ig_username, yt_handle.
        data_tests:
          - not_null

      - name: plataforma
        data_type: varchar
        description: >
          Plataforma social inferida desde el handle (Tiktok, Instagram, Youtube).
          Nunca 'N/A' — las filas sin handle identificable se descartan en el filtrado.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["Instagram", "Tiktok", "Youtube"]

      - name: fecha_snapshot
        data_type: date
        description: >
          Fecha del snapshot de audiencia. Unificada desde snapshot_date (TikTok),
          report_date (Instagram) y period (YouTube).
        data_tests:
          - not_null

      - name: genero
        data_type: varchar
        description: Segmento de género de la audiencia unificado entre plataformas. NULL si no está disponible.
        data_tests:
          - not_null

      - name: edad_segmento
        data_type: varchar
        description: Rango de edad de la audiencia unificado entre plataformas (18-24, 25-34, 35-44, 45-54, 55+).
        data_tests:
          - not_null

      - name: pais
        data_type: varchar
        description: País del segmento de audiencia unificado entre plataformas.
        data_tests:
          - not_null

      - name: porcentaje_audiencia
        data_type: float
        description: Porcentaje de la audiencia total que corresponde a este segmento demográfico (0-100).
        data_tests:
          - not_null

      - name: seguidores
        data_type: number
        description: Número absoluto de seguidores en este segmento demográfico.
        data_tests:
          - not_null

      - name: created_at
        data_type: timestamp_ntz
        data_tests:
          - not_null

      - name: updated_at
        data_type: timestamp_ntz

      - name: _line
        data_type: number

      - name: _fivetran_synced
        data_type: timestamp_tz
        data_tests:
          - not_null

  # ════════════════════════════════════════════════════════════
  # TABLAS DE HECHOS (preparación para gold)
  # ════════════════════════════════════════════════════════════

  - name: int_audiencia
    description: >
      Hecho de audiencia demográfica con claves surrogate para su uso en gold como fact_audiencia.
      Grano: perfil × plataforma × género × edad × país × fecha_snapshot.
      Cada combinación es única gracias a que fecha_snapshot forma parte de la surrogate key.
    columns:
      - name: id_audiencia
        data_type: varchar
        description: >
          Clave surrogate. Generada a partir de username, plataforma, genero,
          edad_segmento, pais y fecha_snapshot. Única por diseño.
        data_tests:
          - not_null
          - unique

      - name: id_perfil_social
        data_type: varchar
        description: FK hacia int_perfil_social. Generada desde username + plataforma.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('int_perfil_social')
                field: id_perfil_social

      - name: id_genero
        data_type: varchar
        description: FK hacia int_genero.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('int_genero')
                field: id_genero

      - name: id_rango_edad
        data_type: varchar
        description: FK hacia int_rango_edad.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('int_rango_edad')
                field: id_rango_edad

      - name: id_pais
        data_type: varchar
        description: FK hacia int_pais.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('int_pais')
                field: id_pais

      - name: fecha_snapshot
        data_type: date
        data_tests:
          - not_null

      - name: porcentaje
        data_type: float
        description: Porcentaje de la audiencia total que corresponde a este segmento (0-100).
        data_tests:
          - not_null

      - name: seguidores
        data_type: number
        description: Número absoluto de seguidores en este segmento demográfico.
        data_tests:
          - not_null

      - name: created_at
        data_type: timestamp_ntz
        data_tests:
          - not_null

      - name: updated_at
        data_type: timestamp_ntz

  - name: int_metrica_perfil
    description: >
      Hecho de métricas semanales de perfil para gold como fact_metrica_perfil.
      Grano: perfil (username + plataforma) × semana_snapshot.
      La deduplicación por perfil_id + semana_snapshot viene heredada desde staging.
    columns:
      - name: id_metrica_perfil
        data_type: varchar
        description: >
          Clave surrogate. Generada a partir de username, plataforma y semana_snapshot.
          Corregida respecto a versión anterior que solo usaba semana_snapshot.
        data_tests:
          - not_null
          - unique

      - name: id_perfil_social
        data_type: varchar
        description: FK hacia int_perfil_social. Generada desde username + plataforma.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('int_perfil_social')
                field: id_perfil_social

      - name: semana_snapshot
        data_type: date
        description: Fecha de inicio de la semana del snapshot (lunes).
        data_tests:
          - not_null

      - name: seguidores
        data_type: number
        data_tests:
          - not_null

      - name: alcance_semanal
        data_type: number
        data_tests:
          - not_null

      - name: impresiones_semanales
        data_type: number
        data_tests:
          - not_null

      - name: visitas_perfil
        data_type: number
        data_tests:
          - not_null

      - name: created_at
        data_type: timestamp_ntz
        data_tests:
          - not_null

      - name: updated_at
        data_type: timestamp_ntz

  - name: int_post
    description: >
      Hecho central de posts para gold como fact_post_interaccion.
      Grano: un registro por post único (post_id). Colapsa las hasta 4 filas por post
      de staging (una por tipo_interaccion) mediante QUALIFY conservando el más reciente.
      Las interacciones por tipo se mantienen en int_interaccion.
      Materializado como incremental append; el filtro _fivetran_synced evita reprocesar.
    columns:
      - name: id_post
        data_type: varchar
        description: Clave surrogate del post. Generada a partir de post_id.
        data_tests:
          - not_null
          - unique

      - name: codigo_post
        data_type: varchar
        description: Identificador natural del post proveniente de la fuente (post_id en staging).
        data_tests:
          - not_null

      - name: raw_json_id
        data_type: varchar
        description: UUID del registro JSON crudo en bronze. Trazabilidad hacia la fuente.
        data_tests:
          - not_null

      - name: id_perfil_social
        data_type: varchar
        description: FK hacia int_perfil_social. Generada desde username + plataforma.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('int_perfil_social')
                field: id_perfil_social

      - name: id_tipo_contenido
        data_type: varchar
        description: FK hacia int_tipo_contenido.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('int_tipo_contenido')
                field: id_tipo_contenido

      - name: id_fuente_ingesta
        data_type: varchar
        description: FK hacia int_fuente_ingesta.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('int_fuente_ingesta')
                field: id_fuente_ingesta

      - name: es_campania
        data_type: boolean
        description: Indica si el post pertenece a una campaña de Black Friday.
        data_tests:
          - not_null

      - name: fecha_publicacion
        data_type: timestamp_ntz
        data_tests:
          - not_null

      - name: descripcion_en
        data_type: varchar
        description: >
          Texto descriptivo del post en inglés. Puede ser nulo (~7% de registros).
          Pendiente de traducción vía pipeline externo cuando esté disponible.

      - name: patrocinado
        data_type: boolean
        data_tests:
          - not_null

      - name: visualizaciones
        data_type: number
        data_tests:
          - not_null

      - name: alcance
        data_type: number
        data_tests:
          - not_null

      - name: impresiones
        data_type: number
        data_tests:
          - not_null

      - name: engagement_total
        data_type: number
        description: >
          Suma total de todas las interacciones del post (likes + comentarios + guardados + compartidos).
        data_tests:
          - not_null

      - name: created_at
        data_type: timestamp_ntz
        data_tests:
          - not_null

      - name: updated_at
        data_type: timestamp_ntz

      - name: _fivetran_synced
        data_type: timestamp_tz
        description: Usado como watermark para la estrategia incremental.
        data_tests:
          - not_null

  - name: int_interaccion
    description: >
      Detalle de interacciones por post y tipo. Grano: post_id × tipo_interaccion.
      Complementa int_post manteniendo la granularidad que int_post colapsa.
    columns:
      - name: id_interaccion
        data_type: varchar
        description: Clave surrogate. Generada a partir de post_id y tipo_interaccion.
        data_tests:
          - not_null
          - unique

      - name: id_post
        data_type: varchar
        description: FK hacia int_post.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('int_post')
                field: id_post

      - name: id_tipo_interaccion
        data_type: varchar
        description: FK hacia int_tipo_interaccion.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('int_tipo_interaccion')
                field: id_tipo_interaccion

      - name: total_interaccion
        data_type: number
        data_tests:
          - not_null

  # ════════════════════════════════════════════════════════════
  # DIMENSIONES
  # ════════════════════════════════════════════════════════════

  - name: int_empresa
    description: >
      Dimensión de empresas. Un registro por empresa (empresa_id).
      Surrogate key generada desde empresa_id (identificador natural de negocio).
      El QUALIFY prioriza registros con web y email no nulos; desempate por created_at asc.
    columns:
      - name: id_empresa
        data_type: varchar
        description: Clave surrogate. Generada a partir de empresa_id.
        data_tests:
          - not_null
          - unique

      - name: codigo_empresa
        data_type: varchar
        description: Identificador natural de la empresa (empresa_id en staging).
        data_tests:
          - not_null
          - unique

      - name: nombre
        data_type: varchar
        data_tests:
          - not_null

      - name: id_pais
        data_type: varchar
        description: FK hacia int_pais.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('int_pais')
                field: id_pais

      - name: id_categoria_empresa
        data_type: varchar
        description: FK hacia int_categoria_empresa.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('int_categoria_empresa')
                field: id_categoria_empresa

      - name: web
        data_type: varchar
        description: URL del sitio web corporativo. Puede ser nulo (~7% de empresas).

      - name: email
        data_type: varchar
        description: Email de contacto. Puede ser nulo (~7% de registros).

  - name: int_perfil_social
    description: >
      Dimensión de perfiles sociales. Un registro por username + plataforma.
      Surrogate key compuesta porque el mismo handle puede existir en varias redes.
      El QUALIFY conserva el registro más reciente si hay múltiples perfil_id
      para la misma combinación username + plataforma.
    columns:
      - name: id_perfil_social
        data_type: varchar
        description: Clave surrogate. Generada a partir de username y plataforma.
        data_tests:
          - not_null
          - unique

      - name: codigo_perfil_social
        data_type: varchar
        description: Identificador natural del perfil (perfil_id en staging).
        data_tests:
          - not_null

      - name: id_empresa
        data_type: varchar
        description: FK hacia int_empresa.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('int_empresa')
                field: id_empresa

      - name: id_red_social
        data_type: varchar
        description: FK hacia int_red_social.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('int_red_social')
                field: id_red_social

      - name: nombre_usuario
        data_type: varchar
        data_tests:
          - not_null

      - name: fecha_creacion
        data_type: date
        data_tests:
          - not_null

      - name: activo
        data_type: boolean
        data_tests:
          - not_null

  - name: int_pais
    description: >
      Dimensión de países. Unión de empresa_pais (staging perfiles) y pais (audiencia demográfica).
      initcap aplicado en ambas fuentes antes de la unión para evitar duplicados por capitalización.
    columns:
      - name: id_pais
        data_type: varchar
        description: Clave surrogate. Generada a partir del nombre del país.
        data_tests:
          - not_null
          - unique

      - name: nombre
        data_type: varchar
        data_tests:
          - not_null
          - unique

  - name: int_categoria_empresa
    description: Dimensión de categorías de empresa. Valores únicos de empresa_categoria en staging.
    columns:
      - name: id_categoria_empresa
        data_type: varchar
        data_tests:
          - not_null
          - unique

      - name: nombre
        data_type: varchar
        data_tests:
          - not_null
          - unique
          - accepted_values:
              arguments:
                values:
                  ["Fintech", "Tecnología", "Fitness", "Educación", "Hostelería",
                   "Moda", "Alimentación", "Viajes", "Retail", "Salud"]

  - name: int_red_social
    description: Dimensión de redes sociales. Valores únicos de plataforma en staging perfiles.
    columns:
      - name: id_red_social
        data_type: varchar
        data_tests:
          - not_null
          - unique

      - name: nombre
        data_type: varchar
        data_tests:
          - not_null
          - unique
          - accepted_values:
              arguments:
                values: ["Instagram", "Tiktok", "Youtube"]

  - name: int_tipo_contenido
    description: Dimensión de tipos de contenido. Valores únicos de tipo_contenido en staging posts.
    columns:
      - name: id_tipo_contenido
        data_type: varchar
        data_tests:
          - not_null
          - unique

      - name: nombre
        data_type: varchar
        data_tests:
          - not_null
          - unique
          - accepted_values:
              arguments:
                values: ["Video", "Story", "Carrusel", "Reel", "Post Estático"]

  - name: int_tipo_interaccion
    description: Dimensión de tipos de interacción. Valores únicos de tipo_interaccion en staging posts.
    columns:
      - name: id_tipo_interaccion
        data_type: varchar
        data_tests:
          - not_null
          - unique

      - name: nombre
        data_type: varchar
        data_tests:
          - not_null
          - unique
          - accepted_values:
              arguments:
                values: ["Like", "Comentario", "Guardado", "Compartir"]

  - name: int_fuente_ingesta
    description: Dimensión de fuentes de ingesta. Valores únicos de source_api en staging posts.
    columns:
      - name: id_fuente_ingesta
        data_type: varchar
        data_tests:
          - not_null
          - unique

      - name: nombre
        data_type: varchar
        data_tests:
          - not_null
          - unique
          - accepted_values:
              arguments:
                values: ["api_v1", "api_v2", "manual_export"]

  - name: int_genero
    description: Dimensión de géneros de audiencia. Valores únicos unificados entre TikTok, Instagram y YouTube.
    columns:
      - name: id_genero
        data_type: varchar
        data_tests:
          - not_null
          - unique

      - name: nombre
        data_type: varchar
        data_tests:
          - not_null
          - unique

  - name: int_rango_edad
    description: >
      Dimensión de rangos de edad. Incluye los límites numéricos edad_min y edad_max
      para facilitar filtros y ordenaciones en gold. edad_max es NULL para el rango 55+.
    columns:
      - name: id_rango_edad
        data_type: varchar
        data_tests:
          - not_null
          - unique

      - name: rango_edad
        data_type: varchar
        data_tests:
          - not_null
          - unique
          - accepted_values:
              arguments:
                values: ["18-24", "25-34", "35-44", "45-54", "55+"]

      - name: edad_min
        data_type: number
        data_tests:
          - not_null

      - name: edad_max
        data_type: number
        description: Límite superior del rango. NULL intencional para el rango 55+.

  # ════════════════════════════════════════════════════════════
  # HASHTAGS (bridge)
  # ════════════════════════════════════════════════════════════

  - name: int_hashtag_post_separar
    description: >
      Modelo auxiliar. Explota la cadena de hashtags de cada post en filas individuales.
      Filtra NULLs, strings vacíos y tokens vacíos generados por espacios dobles.
      Normaliza quitando '#' si existe y aplicando lowercase. Paso previo a int_hashtag
      e int_post_hashtag.
    columns:
      - name: post_id
        data_type: varchar
        data_tests:
          - not_null

      - name: plataforma
        data_type: varchar
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["Instagram", "Tiktok", "Youtube", "Desconocido"]

      - name: hashtag
        data_type: varchar
        description: Hashtag individual sin '#', en lowercase.
        data_tests:
          - not_null

  - name: int_hashtag
    description: Dimensión de hashtags únicos. Generada desde int_hashtag_post_separar.
    columns:
      - name: id_hashtag
        data_type: varchar
        data_tests:
          - not_null
          - unique

      - name: hashtag
        data_type: varchar
        data_tests:
          - not_null
          - unique

  - name: int_post_hashtag
    description: >
      Tabla puente post ↔ hashtag. Permite análisis de rendimiento por hashtag en gold.
      Cada fila representa una relación única entre un post y un hashtag.
    columns:
      - name: id_post
        data_type: varchar
        description: FK hacia int_post.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('int_post')
                field: id_post

      - name: id_hashtag
        data_type: varchar
        description: FK hacia int_hashtag.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('int_hashtag')
                field: id_hashtag