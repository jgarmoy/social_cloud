version: 2

models:
  - name: int_audiencia_demografica
    description: >
      Unificación de los tres bloques de audiencia demográfica (TikTok, Instagram, YouTube)
      en una estructura única y normalizada. Cada fila representa un segmento demográfico
      (género × edad × país) para un perfil en una fecha de snapshot concreta.
    columns:
      - name: empresa_id
        data_type: varchar
        description: >
          Identificador de la empresa propietaria del perfil. FK hacia int_empresa.
        data_tests:
          - not_null

      - name: perfil_id
        data_type: varchar
        description: >
          Identificador del perfil social. FK hacia int_perfil_social.
        data_tests:
          - not_null

      - name: username
        data_type: varchar
        description: >
          Handle del perfil en la plataforma, sin el prefijo '@'.
        data_tests:
          - not_null

      - name: plataforma
        data_type: varchar
        description: >
          Plataforma social normalizada (Instagram, Tiktok, Youtube).
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["Instagram", "Tiktok", "Youtube"]

      - name: fecha_snapshot
        data_type: date
        description: >
          Fecha del snapshot de audiencia. Unificada desde snapshot_date (TikTok),
          report_date (Instagram) y period (YouTube).
        data_tests:
          - not_null

      - name: genero
        data_type: varchar
        description: >
          Segmento de género de la audiencia unificado entre plataformas.
        data_tests:
          - not_null

      - name: edad_segmento
        data_type: varchar
        description: >
          Rango de edad de la audiencia unificado entre plataformas (18-24, 25-34, 35-44, 45-54, 55+).
        data_tests:
          - not_null

      - name: pais
        data_type: varchar
        description: >
          País del segmento de audiencia unificado entre plataformas.
        data_tests:
          - not_null

      - name: porcentaje_audiencia
        data_type: float
        description: >
          Porcentaje de la audiencia total que corresponde a este segmento demográfico (0-100).
        data_tests:
          - not_null

      - name: seguidores
        data_type: number
        description: >
          Número absoluto de seguidores en este segmento demográfico.
        data_tests:
          - not_null

      - name: created_at
        data_type: timestamp_ntz
        description: >
          Timestamp de creación del registro en la fuente.
        data_tests:
          - not_null

      - name: updated_at
        data_type: timestamp_ntz
        description: >
          Timestamp de última actualización. Puede ser nulo si no hubo modificaciones.

      - name: _line
        data_type: number
        description: >
          Número de línea del archivo fuente. Metadato de Fivetran para trazabilidad.

      - name: _fivetran_synced
        data_type: timestamp_tz
        description: >
          Timestamp de la última sincronización de Fivetran.
        data_tests:
          - not_null

  - name: int_audiencia
    description: >
      Tabla de audiencia con claves surrogate para su uso en la capa gold.
      Cada fila representa un segmento demográfico (género × edad × país) para
      un perfil en una fecha de snapshot, con FKs hacia las dimensiones de género,
      rango de edad y país.
    columns:
      - name: id_audiencia
        data_type: varchar
        description: >
          Clave surrogate de la audiencia. Generada a partir de id_perfil_social,
          id_genero, id_rango_edad, id_pais y fecha_snapshot.
        data_tests:
          - not_null
          - unique

      - name: id_perfil_social
        data_type: varchar
        description: >
          FK hacia int_perfil_social.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('int_perfil_social')
                field: id_perfil_social

      - name: id_genero
        data_type: varchar
        description: >
          FK hacia int_genero.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('int_genero')
                field: id_genero

      - name: id_rango_edad
        data_type: varchar
        description: >
          FK hacia int_rango_edad.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('int_rango_edad')
                field: id_rango_edad

      - name: id_pais
        data_type: varchar
        description: >
          FK hacia int_pais.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('int_pais')
                field: id_pais

      - name: fecha_snapshot
        data_type: date
        description: >
          Fecha del snapshot de audiencia.
        data_tests:
          - not_null

      - name: porcentaje
        data_type: float
        description: >
          Porcentaje de la audiencia total que corresponde a este segmento (0-100).
        data_tests:
          - not_null

      - name: seguidores
        data_type: number
        description: >
          Número absoluto de seguidores en este segmento demográfico.
        data_tests:
          - not_null

      - name: created_at
        data_type: timestamp_ntz
        description: >
          Timestamp de creación del registro en la fuente.
        data_tests:
          - not_null

      - name: updated_at
        data_type: timestamp_ntz
        description: >
          Timestamp de última actualización. Puede ser nulo si no hubo modificaciones.

  - name: int_categoria_empresa
    description: >
      Dimensión de categorías de empresa. Generada a partir de los valores únicos
      de empresa_categoria en staging. Cada fila representa un sector o vertical.
    columns:
      - name: id_categoria_empresa
        data_type: varchar
        description: >
          Clave surrogate de la categoría. Generada a partir del nombre.
        data_tests:
          - not_null
          - unique

      - name: nombre
        data_type: varchar
        description: >
          Nombre del sector o vertical de la empresa (Fintech, Tecnología, Fitness, etc.).
        data_tests:
          - not_null
          - unique

  - name: int_empresa
    description: >
      Dimensión de empresas con claves surrogate. Cada fila representa una empresa única
      con sus atributos descriptivos y FKs hacia las dimensiones de país y categoría.
    columns:
      - name: id_empresa
        data_type: varchar
        description: >
          Clave surrogate de la empresa. Generada a partir de empresa_id.
        data_tests:
          - not_null
          - unique

      - name: codigo_empresa
        data_type: varchar
        description: >
          Identificador natural de la empresa proveniente de la fuente (empresa_id en staging).
        data_tests:
          - not_null

      - name: nombre
        data_type: varchar
        description: >
          Nombre legal o comercial de la empresa.
        data_tests:
          - not_null

      - name: id_pais
        data_type: varchar
        description: >
          FK hacia int_pais.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('int_pais')
                field: id_pais

      - name: id_categoria_empresa
        data_type: varchar
        description: >
          FK hacia int_categoria_empresa.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('int_categoria_empresa')
                field: id_categoria_empresa

      - name: web
        data_type: varchar
        description: >
          URL del sitio web corporativo. Puede ser nulo (~7% de empresas sin web registrada).

      - name: email
        data_type: varchar
        description: >
          Email de contacto de la empresa. Puede ser nulo (~7% de registros).

  - name: int_fuente_ingesta
    description: >
      Dimensión de fuentes de ingesta de datos. Generada a partir de los valores únicos
      de source_api en staging (api_v1, api_v2, manual_export).
    columns:
      - name: id_fuente_ingesta
        data_type: varchar
        description: >
          Clave surrogate de la fuente de ingesta. Generada a partir del nombre.
        data_tests:
          - not_null
          - unique

      - name: nombre
        data_type: varchar
        description: >
          Nombre de la fuente de ingesta (api_v1, api_v2, manual_export).
        data_tests:
          - not_null
          - unique
          - accepted_values:
              arguments:
                values: ["api_v1", "api_v2", "manual_export"]

  - name: int_genero
    description: >
      Dimensión de géneros de audiencia. Generada a partir de los valores únicos
      de género unificados entre TikTok, Instagram y YouTube.
    columns:
      - name: id_genero
        data_type: varchar
        description: >
          Clave surrogate del género. Generada a partir del nombre.
        data_tests:
          - not_null
          - unique

      - name: nombre
        data_type: varchar
        description: >
          Nombre del segmento de género (Hombre, Mujer, No Binario).
        data_tests:
          - not_null
          - unique

  - name: int_hashtag_post_separar
    description: >
      Modelo auxiliar que separa la cadena de hashtags de cada post en filas individuales.
      Cada fila representa la relación entre un post y un hashtag individual antes de
      generar las claves surrogate. Paso previo a int_hashtag e int_post_hashtag.
    columns:
      - name: post_id
        data_type: varchar
        description: >
          Identificador natural del post proveniente de staging.
        data_tests:
          - not_null

      - name: plataforma
        data_type: varchar
        description: >
          Plataforma social normalizada del post.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["Instagram", "Tiktok", "Youtube", "Desconocido"]

      - name: hashtagint_hashtag$0int_hashtag$0
        data_type: varchar
        description: >
          Hashtag individual extraído de la cadena de hashtags del post.
        data_tests:
          - not_null

  - name: int_hashtag
    description: >
      Dimensión de hashtags únicos. Generada a partir de los valores únicos
      extraídos en int_hashtag_post_separar.
    columns:
      - name: id_hashtag
        data_type: varchar
        description: >
          Clave surrogate del hashtag. Generada a partir del texto del hashtag.
        data_tests:
          - not_null
          - unique

      - name: hashtag
        data_type: varchar
        description: >
          Texto del hashtag sin el símbolo '#'.
        data_tests:
          - not_null
          - unique

  - name: int_interaccion
    description: >
      Tabla de interacciones por post y tipo. Cada fila representa el total de
      interacciones de un tipo concreto (like, comentario, guardado, compartir)
      para un post. Se genera a partir de las 4 filas por post de staging,
      manteniendo la granularidad tipo_interaccion que int_post colapsa.
    columns:
      - name: id_interaccion
        data_type: varchar
        description: >
          Clave surrogate de la interacción. Generada a partir de id_post e id_tipo_interaccion.
        data_tests:
          - not_null
          - unique

      - name: id_post
        data_type: varchar
        description: >
          FK hacia int_post.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('int_post')
                field: id_post

      - name: id_tipo_interaccion
        data_type: varchar
        description: >
          FK hacia int_tipo_interaccion.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('int_tipo_interaccion')
                field: id_tipo_interaccion

      - name: total_interaccion
        data_type: number
        description: >
          Número total de interacciones del tipo indicado para este post.
        data_tests:
          - not_null

  - name: int_metrica_perfil
    description: >
      Snapshot semanal de métricas de perfil. Cada fila representa el estado
      de un perfil en una semana concreta con sus métricas de alcance y engagement.
      Desduplicado por perfil_id + semana_snapshot heredado desde staging.
    columns:
      - name: id_metrica_perfil
        data_type: varchar
        description: >
          Clave surrogate de la métrica. Generada a partir de id_perfil_social y semana_snapshot.
        data_tests:
          - not_null
          - unique

      - name: id_perfil_social
        data_type: varchar
        description: >
          FK hacia int_perfil_social.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('int_perfil_social')
                field: id_perfil_social

      - name: semana_snapshot
        data_type: date
        description: >
          Fecha de inicio de la semana del snapshot (lunes).
        data_tests:
          - not_null

      - name: seguidores
        data_type: number
        description: >
          Número total de seguidores del perfil en la semana del snapshot.
        data_tests:
          - not_null

      - name: alcance_semanal
        data_type: number
        description: >
          Cuentas únicas alcanzadas durante la semana del snapshot.
        data_tests:
          - not_null

      - name: impresiones_semanales
        data_type: number
        description: >
          Total de impresiones acumuladas en la semana (incluye vistas repetidas).
        data_tests:
          - not_null

      - name: visitas_perfil
        data_type: number
        description: >
          Número de visitas directas al perfil durante la semana.
        data_tests:
          - not_null

      - name: created_at
        data_type: timestamp_ntz
        description: >
          Timestamp de creación del registro en la fuente.
        data_tests:
          - not_null

      - name: updated_at
        data_type: timestamp_ntz
        description: >
          Timestamp de última actualización. Puede ser nulo si no hubo modificaciones.

  - name: int_pais
    description: >
      Dimensión de países. Generada a partir de los valores únicos de empresa_pais
      en staging y de los países de audiencia demográfica.
    columns:
      - name: id_pais
        data_type: varchar
        description: >
          Clave surrogate del país. Generada a partir del nombre.
        data_tests:
          - not_null
          - unique

      - name: nombre
        data_type: varchar
        description: >
          Nombre del país.
        data_tests:
          - not_null
          - unique

  - name: int_perfil_social
    description: >
      Dimensión de perfiles sociales con claves surrogate. Cada fila representa
      un perfil único en una plataforma con sus atributos descriptivos y FK hacia
      la empresa propietaria y la red social.
    columns:
      - name: id_perfil_social
        data_type: varchar
        description: >
          Clave surrogate del perfil social. Generada a partir del username.
        data_tests:
          - not_null
          - unique

      - name: codigo_perfil_social
        data_type: varchar
        description: >
          Identificador natural del perfil proveniente de la fuente (perfil_id en staging).
        data_tests:
          - not_null

      - name: id_empresa
        data_type: varchar
        description: >
          FK hacia int_empresa.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('int_empresa')
                field: id_empresa

      - name: id_red_social
        data_type: varchar
        description: >
          FK hacia int_red_social.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('int_red_social')
                field: id_red_social

      - name: nombre_usuario
        data_type: varchar
        description: >
          Handle del perfil en la plataforma, sin el prefijo '@'.
        data_tests:
          - not_null

      - name: fecha_creacion
        data_type: date
        description: >
          Fecha en que se creó el perfil en la plataforma.
        data_tests:
          - not_null

      - name: activo
        data_type: boolean
        description: >
          Indica si el perfil está activo en la plataforma.
        data_tests:
          - not_null

  - name: int_post_hashtag
    description: >
      Tabla puente entre posts y hashtags. Cada fila representa la relación
      entre un post y un hashtag. Permite análisis de rendimiento por hashtag
      en la capa gold.
    columns:
      - name: id_hashtag
        data_type: varchar
        description: >
          FK hacia int_hashtag.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('int_hashtag')
                field: id_hashtag

      - name: id_post
        data_type: varchar
        description: >
          FK hacia int_post.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('int_post')
                field: id_post

  - name: int_post
    description: >
      Tabla central de posts con una fila por post. Colapsa las 4 filas por post
      de staging (una por tipo_interaccion) en un único registro mediante QUALIFY,
      conservando las métricas agregadas del post. Las interacciones por tipo se
      mantienen en int_interaccion.
    columns:
      - name: id_post
        data_type: varchar
        description: >
          Clave surrogate del post. Generada a partir de post_id y plataforma.
        data_tests:
          - not_null
          - unique

      - name: codigo_post
        data_type: varchar
        description: >
          Identificador natural del post proveniente de la fuente (post_id en staging).
        data_tests:
          - not_null

      - name: raw_json_id
        data_type: varchar
        description: >
          UUID del registro JSON crudo en bronze. Trazabilidad hacia la fuente.
        data_tests:
          - not_null

      - name: id_perfil_social
        data_type: varchar
        description: >
          FK hacia int_perfil_social.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('int_perfil_social')
                field: id_perfil_social

      - name: id_tipo_contenido
        data_type: varchar
        description: >
          FK hacia int_tipo_contenido.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('int_tipo_contenido')
                field: id_tipo_contenido

      - name: id_fuente_ingesta
        data_type: varchar
        description: >
          FK hacia int_fuente_ingesta.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('int_fuente_ingesta')
                field: id_fuente_ingesta

      - name: es_campania
        data_type: boolean
        description: >
          Indica si el post pertenece a una campaña de Black Friday.
        data_tests:
          - not_null

      - name: fecha_publicacion
        data_type: timestamp_ntz
        description: >
          Timestamp UTC de publicación del post en la plataforma.
        data_tests:
          - not_null

      - name: descripcion_en
        data_type: varchar
        description: >
          Texto descriptivo del post en inglés. Puede ser nulo (~7% de registros).
          Pendiente de traducción via script externo con Gemini cuando esté disponible.

      - name: patrocinado
        data_type: boolean
        description: >
          Indica si el post es contenido patrocinado/publicidad pagada.
        data_tests:
          - not_null

      - name: visualizaciones
        data_type: number
        description: >
          Número total de visualizaciones del post.
        data_tests:
          - not_null

      - name: alcance
        data_type: number
        description: >
          Número de cuentas únicas que vieron el post.
        data_tests:
          - not_null

      - name: impresiones
        data_type: number
        description: >
          Total de veces que se mostró el post (incluye vistas repetidas).
        data_tests:
          - not_null

      - name: engagement_total
        data_type: number
        description: >
          Suma total de todas las interacciones del post (likes + comentarios + guardados + compartidos).
        data_tests:
          - not_null

      - name: created_at
        data_type: timestamp_ntz
        description: >
          Timestamp de creación del registro en la fuente.
        data_tests:
          - not_null

      - name: updated_at
        data_type: timestamp_ntz
        description: >
          Timestamp de última actualización. Puede ser nulo si no hubo modificaciones.

      - name: _fivetran_synced
        data_type: timestamp_tz
        description: >
          Timestamp de la última sincronización de Fivetran.
        data_tests:
          - not_null

  - name: int_rango_edad
    description: >
      Dimensión de rangos de edad de audiencia. Generada a partir de los valores únicos
      de edad_segmento en int_audiencia_demografica, con los límites numéricos de cada rango.
    columns:
      - name: id_rango_edad
        data_type: varchar
        description: >
          Clave surrogate del rango de edad. Generada a partir del rango_edad.
        data_tests:
          - not_null
          - unique

      - name: rango_edad
        data_type: varchar
        description: >
          Etiqueta del rango de edad (18-24, 25-34, 35-44, 45-54, 55+).
        data_tests:
          - not_null
          - unique
          - accepted_values:
              arguments:
                values: ["18-24", "25-34", "35-44", "45-54", "55+"]

      - name: edad_min
        data_type: number
        description: >
          Límite inferior del rango de edad en años.
        data_tests:
          - not_null

      - name: edad_max
        data_type: number
        description: >
          Límite superior del rango de edad en años. Puede ser nulo para el rango 55+.

  - name: int_red_social
    description: >
      Dimensión de redes sociales. Generada a partir de los valores únicos
      de plataforma en staging (Instagram, Tiktok, Youtube).
    columns:
      - name: id_red_social
        data_type: varchar
        description: >
          Clave surrogate de la red social. Generada a partir del nombre.
        data_tests:
          - not_null
          - unique

      - name: nombre
        data_type: varchar
        description: >
          Nombre de la red social (Instagram, Tiktok, Youtube).
        data_tests:
          - not_null
          - unique
          - accepted_values:
              arguments:
                values: ["Instagram", "Tiktok", "Youtube"]

  - name: int_tipo_contenido
    description: >
      Dimensión de tipos de contenido. Generada a partir de los valores únicos
      de tipo_contenido en staging.
    columns:
      - name: id_tipo_contenido
        data_type: varchar
        description: >
          Clave surrogate del tipo de contenido. Generada a partir del nombre.
        data_tests:
          - not_null
          - unique

      - name: nombre
        data_type: varchar
        description: >
          Nombre del tipo de contenido (Video, Story, Carrusel, Reel, Post Estático).
        data_tests:
          - not_null
          - unique
          - accepted_values:
              arguments:
                values: ["Video", "Story", "Carrusel", "Reel", "Post Estático"]

  - name: int_tipo_interaccion
    description: >
      Dimensión de tipos de interacción. Generada a partir de los valores únicos
      de tipo_interaccion en staging.
    columns:
      - name: id_tipo_interaccion
        data_type: varchar
        description: >
          Clave surrogate del tipo de interacción. Generada a partir del nombre.
        data_tests:
          - not_null
          - unique

      - name: nombre
        data_type: varchar
        description: >
          Nombre del tipo de interacción (Like, Comentario, Guardado, Compartir).
        data_tests:
          - not_null
          - unique
          - accepted_values:
              arguments:
                values: ["Like", "Comentario", "Guardado", "Compartir"]
