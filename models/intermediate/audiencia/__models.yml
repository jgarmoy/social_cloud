version: 2

models:

  - name: int_genero
    description: >
      Dimensión de géneros de audiencia. Valores únicos unificados entre TikTok,
      Instagram y YouTube desde int_audiencia_demografica.
    columns:
      - name: id_genero
        data_type: varchar
        data_tests:
          - not_null
          - unique

      - name: nombre
        data_type: varchar
        data_tests:
          - not_null
          - unique

  - name: int_rango_edad
    description: >
      Dimensión de rangos de edad con límites numéricos edad_min y edad_max
      para facilitar filtros y ordenaciones en gold. edad_max es NULL para 55+.
    columns:
      - name: id_rango_edad
        data_type: varchar
        data_tests:
          - not_null
          - unique

      - name: rango_edad
        data_type: varchar
        data_tests:
          - not_null
          - unique

      - name: edad_min
        data_type: number
        description: Campo derivado parseado desde rango_edad. No existe en staging.
        data_tests:
          - not_null

      - name: edad_max
        data_type: number
        description: >
          Campo derivado parseado desde rango_edad. NULL intencional para el rango 55+.

  - name: int_audiencia
    description: >
      Hecho de audiencia demográfica con claves surrogate.
      Grano: perfil × plataforma × género × edad × país × fecha_snapshot.
    columns:
      - name: id_audiencia
        data_type: varchar
        description: >
          Clave surrogate. Generada desde username, plataforma, genero,
          edad_segmento, pais y fecha_snapshot.
        data_tests:
          - not_null
          - unique

      - name: id_perfil_social
        data_type: varchar
        description: FK hacia int_perfil_social. Generada desde username + plataforma.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('int_perfil_social')
                field: id_perfil_social

      - name: id_genero
        data_type: varchar
        description: FK hacia int_genero.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('int_genero')
                field: id_genero

      - name: id_rango_edad
        data_type: varchar
        description: FK hacia int_rango_edad.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('int_rango_edad')
                field: id_rango_edad

      - name: id_pais
        data_type: varchar
        description: FK hacia int_pais.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('int_pais')
                field: id_pais

      - name: fecha_snapshot
        data_type: date
        data_tests:
          - not_null

      - name: porcentaje
        data_type: float
        data_tests:
          - not_null

      - name: seguidores
        data_type: number
        data_tests:
          - not_null

      - name: created_at
        data_type: timestamp_ntz
        data_tests:
          - not_null

      - name: updated_at
        data_type: timestamp_ntz