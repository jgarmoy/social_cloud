version: 2

models:

  # ════════════════════════════════════════════════════════════
  # TABLAS DE HECHOS
  # ════════════════════════════════════════════════════════════

  - name: fact_post_interaccion
    description: >
      Hecho central de rendimiento de contenido. Grano: post × tipo_interaccion.
      Cada post genera hasta 4 filas (Like, Comentario, Guardado, Compartir).
      Las métricas de post (visualizaciones, alcance, impresiones, engagement_total)
      se repiten en las 4 filas: al agregar sin filtrar por tipo_interaccion,
      usar engagement_total directamente o deduplicar previamente por id_post.
      Casos de uso: rendimiento de posts, análisis por tipo de contenido,
      comparativa entre plataformas, impacto de campañas BF, análisis por fuente de ingesta.
    columns:
      - name: id_interaccion
        data_type: varchar
        description: PK. Surrogate key de post × tipo_interaccion.
        data_tests:
          - not_null
          - unique

      - name: id_post
        data_type: varchar
        description: FK hacia dim_post (o agrupador natural de métricas de post).
        data_tests:
          - not_null

      - name: id_tipo_interaccion
        data_type: varchar
        description: FK hacia dim_tipo_interaccion.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_tipo_interaccion')
                field: id_tipo_interaccion

      - name: id_perfil_social
        data_type: varchar
        description: FK hacia dim_perfil_social.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_perfil_social')
                field: id_perfil_social

      - name: id_tipo_contenido
        data_type: varchar
        description: FK hacia dim_tipo_contenido.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_tipo_contenido')
                field: id_tipo_contenido

      - name: id_fuente_ingesta
        data_type: varchar
        description: FK hacia dim_fuente_ingesta.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_fuente_ingesta')
                field: id_fuente_ingesta

      - name: id_fecha
        data_type: date
        description: FK hacia dim_fecha. Fecha de publicación del post (grano día).
        data_tests:
          - not_null

      - name: codigo_post
        data_type: varchar
        description: Identificador natural del post en la plataforma de origen.
        data_tests:
          - not_null

      - name: fecha_publicacion
        data_type: timestamp_ntz
        description: Timestamp UTC de publicación del post.
        data_tests:
          - not_null

      - name: descripcion_en
        data_type: varchar
        description: Texto descriptivo del post en inglés. Nulo en ~7% de registros.

      - name: patrocinado
        data_type: boolean
        description: Indica si el post es contenido patrocinado.
        data_tests:
          - not_null

      - name: es_campania
        data_type: boolean
        description: Indica si el post pertenece a una campaña de Black Friday.
        data_tests:
          - not_null

      - name: visualizaciones
        data_type: number
        description: >
          Total de visualizaciones del post. Mismo valor en las 4 filas del post.
          Deduplicar por id_post antes de sumar a nivel de análisis.
        data_tests:
          - not_null

      - name: alcance
        data_type: number
        description: >
          Cuentas únicas que vieron el post. Mismo valor en las 4 filas del post.
        data_tests:
          - not_null

      - name: impresiones
        data_type: number
        description: >
          Total de veces que se mostró el post (incluye vistas repetidas).
          Debe ser >= alcance. Mismo valor en las 4 filas del post.
        data_tests:
          - not_null

      - name: engagement_total
        data_type: number
        description: >
          Suma de todas las interacciones del post (likes + comentarios + guardados + compartidos).
          Mismo valor en las 4 filas del post. Usar directamente para totales de engagement.
        data_tests:
          - not_null

      - name: total_interaccion
        data_type: number
        description: >
          Número de interacciones del tipo indicado por id_tipo_interaccion para este post.
          Varía entre las 4 filas del mismo post.
        data_tests:
          - not_null

      - name: engagement_rate_pct
        data_type: float
        description: >
          Ratio de engagement calculado como engagement_total / alcance × 100.
          NULL si alcance = 0. Mismo valor en las 4 filas del post.

      - name: created_at
        data_type: timestamp_ntz
        data_tests:
          - not_null

      - name: updated_at
        data_type: timestamp_ntz

      - name: _fivetran_synced
        data_type: timestamp_tz
        data_tests:
          - not_null

  - name: fact_metrica_perfil
    description: >
      Hecho de evolución semanal de perfiles sociales. Grano: perfil × semana_snapshot.
      Casos de uso: crecimiento de seguidores, evolución de alcance e impresiones,
      comparativa de perfiles dentro de una empresa, benchmarking entre plataformas.
    columns:
      - name: id_metrica_perfil
        data_type: varchar
        description: PK. Surrogate key de perfil × semana_snapshot.
        data_tests:
          - not_null
          - unique

      - name: id_perfil_social
        data_type: varchar
        description: FK hacia dim_perfil_social.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_perfil_social')
                field: id_perfil_social

      - name: id_fecha
        data_type: date
        description: FK hacia dim_fecha. Corresponde a semana_snapshot (grano semana).
        data_tests:
          - not_null

      - name: semana_snapshot
        data_type: date
        description: Fecha de inicio de la semana del snapshot (lunes).
        data_tests:
          - not_null

      - name: seguidores
        data_type: number
        description: Número total de seguidores del perfil en esta semana.
        data_tests:
          - not_null

      - name: alcance_semanal
        data_type: number
        description: Cuentas únicas alcanzadas durante la semana.
        data_tests:
          - not_null

      - name: impresiones_semanales
        data_type: number
        description: Total de impresiones acumuladas en la semana.
        data_tests:
          - not_null

      - name: visitas_perfil
        data_type: number
        description: Visitas directas al perfil durante la semana.
        data_tests:
          - not_null

      - name: tasa_alcance_pct
        data_type: float
        description: >
          Porcentaje de seguidores alcanzados en la semana (alcance_semanal / seguidores × 100).
          NULL si seguidores = 0.

      - name: tasa_cobertura_pct
        data_type: float
        description: >
          Porcentaje de impresiones que llegaron a usuarios únicos
          (alcance_semanal / impresiones_semanales × 100). NULL si impresiones = 0.

      - name: created_at
        data_type: timestamp_ntz
        data_tests:
          - not_null

      - name: updated_at
        data_type: timestamp_ntz

  - name: fact_audiencia
    description: >
      Hecho de composición demográfica de audiencia. Grano: perfil × snapshot × género × edad × país.
      Casos de uso: análisis de audiencia por demografía, comparativa de audiencias entre
      perfiles y plataformas, evolución temporal de la composición demográfica.
    columns:
      - name: id_audiencia
        data_type: varchar
        description: PK. Surrogate key de perfil × plataforma × género × edad × país × snapshot.
        data_tests:
          - not_null
          - unique

      - name: id_perfil_social
        data_type: varchar
        description: FK hacia dim_perfil_social.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_perfil_social')
                field: id_perfil_social

      - name: id_genero
        data_type: varchar
        description: FK hacia dim_genero.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_genero')
                field: id_genero

      - name: id_rango_edad
        data_type: varchar
        description: FK hacia dim_rango_edad.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_rango_edad')
                field: id_rango_edad

      - name: id_pais
        data_type: varchar
        description: FK hacia dim_pais.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_pais')
                field: id_pais

      - name: id_fecha
        data_type: date
        description: FK hacia dim_fecha. Corresponde a fecha_snapshot.
        data_tests:
          - not_null

      - name: fecha_snapshot
        data_type: date
        description: Fecha del snapshot de audiencia.
        data_tests:
          - not_null

      - name: porcentaje
        data_type: float
        description: Porcentaje de la audiencia total en este segmento demográfico (0-100).
        data_tests:
          - not_null

      - name: seguidores
        data_type: number
        description: Número absoluto de seguidores en este segmento.
        data_tests:
          - not_null

      - name: created_at
        data_type: timestamp_ntz
        data_tests:
          - not_null

      - name: updated_at
        data_type: timestamp_ntz

  # ════════════════════════════════════════════════════════════
  # DIMENSIONES
  # ════════════════════════════════════════════════════════════

  - name: dim_perfil_social
    description: >
      Dimensión de perfiles sociales con atributos de empresa y red social desnormalizados.
      Un registro por username × plataforma. Referencia central para las tres tablas de hechos.
    columns:
      - name: id_perfil_social
        data_type: varchar
        description: PK. Surrogate key generada desde username + plataforma.
        data_tests:
          - not_null
          - unique

      - name: codigo_perfil_social
        data_type: varchar
        description: Identificador natural del perfil (perfil_id en staging).
        data_tests:
          - not_null

      - name: id_empresa
        data_type: varchar
        description: FK hacia dim_empresa.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_empresa')
                field: id_empresa

      - name: id_red_social
        data_type: varchar
        description: FK hacia dim_tipo_interaccion (red social).
        data_tests:
          - not_null

      - name: nombre_usuario
        data_type: varchar
        data_tests:
          - not_null

      - name: fecha_creacion
        data_type: date
        data_tests:
          - not_null

      - name: activo
        data_type: boolean
        data_tests:
          - not_null

      - name: red_social
        data_type: varchar
        description: Nombre de la red social desnormalizado (Instagram, Tiktok, Youtube).
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["Instagram", "Tiktok", "Youtube"]

      - name: empresa_nombre
        data_type: varchar
        data_tests:
          - not_null

      - name: codigo_empresa
        data_type: varchar
        data_tests:
          - not_null

      - name: empresa_pais
        data_type: varchar
        data_tests:
          - not_null

      - name: empresa_categoria
        data_type: varchar
        data_tests:
          - not_null

  - name: dim_empresa
    description: >
      Dimensión de empresas con país y categoría desnormalizados.
      Un registro por empresa. Referencia para dim_perfil_social y análisis por empresa.
    columns:
      - name: id_empresa
        data_type: varchar
        description: PK. Surrogate key generada desde empresa_id.
        data_tests:
          - not_null
          - unique

      - name: codigo_empresa
        data_type: varchar
        description: Identificador natural de la empresa.
        data_tests:
          - not_null
          - unique

      - name: nombre
        data_type: varchar
        data_tests:
          - not_null

      - name: id_pais
        data_type: varchar
        description: FK hacia dim_pais.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_pais')
                field: id_pais

      - name: pais
        data_type: varchar
        description: Nombre del país desnormalizado.
        data_tests:
          - not_null

      - name: id_categoria_empresa
        data_type: varchar
        data_tests:
          - not_null

      - name: categoria
        data_type: varchar
        description: Categoría de la empresa desnormalizada (Fintech, Moda, etc.).
        data_tests:
          - not_null

      - name: web
        data_type: varchar

      - name: email
        data_type: varchar

  - name: dim_tipo_contenido
    description: Dimensión de tipos de contenido publicado (Video, Story, Carrusel, Reel, Post Estático).
    columns:
      - name: id_tipo_contenido
        data_type: varchar
        data_tests:
          - not_null
          - unique
      - name: nombre
        data_type: varchar
        data_tests:
          - not_null
          - unique
          - accepted_values:
              arguments:
                values: ["Video", "Story", "Carrusel", "Reel", "Post Estático"]

  - name: dim_tipo_interaccion
    description: Dimensión de tipos de interacción (Like, Comentario, Guardado, Compartir).
    columns:
      - name: id_tipo_interaccion
        data_type: varchar
        data_tests:
          - not_null
          - unique
      - name: nombre
        data_type: varchar
        data_tests:
          - not_null
          - unique
          - accepted_values:
              arguments:
                values: ["Like", "Comentario", "Guardado", "Compartir"]

  - name: dim_fuente_ingesta
    description: Dimensión de fuentes de ingesta (api_v1, api_v2, manual_export).
    columns:
      - name: id_fuente_ingesta
        data_type: varchar
        data_tests:
          - not_null
          - unique
      - name: nombre
        data_type: varchar
        data_tests:
          - not_null
          - unique
          - accepted_values:
              arguments:
                values: ["api_v1", "api_v2", "manual_export"]

  - name: dim_genero
    description: Dimensión de géneros de audiencia unificados entre plataformas.
    columns:
      - name: id_genero
        data_type: varchar
        data_tests:
          - not_null
          - unique
      - name: nombre
        data_type: varchar
        data_tests:
          - not_null
          - unique

  - name: dim_rango_edad
    description: >
      Dimensión de rangos de edad de audiencia con límites numéricos (edad_min, edad_max).
      edad_max es NULL intencional para el rango 55+.
    columns:
      - name: id_rango_edad
        data_type: varchar
        data_tests:
          - not_null
          - unique
      - name: rango_edad
        data_type: varchar
        data_tests:
          - not_null
          - unique
          - accepted_values:
              arguments:
                values: ["18-24", "25-34", "35-44", "45-54", "55+"]
      - name: edad_min
        data_type: number
        data_tests:
          - not_null
      - name: edad_max
        data_type: number
        description: NULL intencional para el rango 55+.

  - name: dim_pais
    description: Dimensión de países. Cubre tanto países de empresa como países de audiencia demográfica.
    columns:
      - name: id_pais
        data_type: varchar
        data_tests:
          - not_null
          - unique
      - name: nombre
        data_type: varchar
        data_tests:
          - not_null
          - unique

  - name: dim_hashtag
    description: Dimensión de hashtags únicos extraídos de los posts. Sin '#', en lowercase.
    columns:
      - name: id_hashtag
        data_type: varchar
        data_tests:
          - not_null
          - unique
      - name: hashtag
        data_type: varchar
        data_tests:
          - not_null
          - unique

  # ════════════════════════════════════════════════════════════
  # BRIDGE
  # ════════════════════════════════════════════════════════════

  - name: bridge_post_hashtag
    description: >
      Tabla puente entre fact_post_interaccion y dim_hashtag.
      Un post puede tener N hashtags; un hashtag puede aparecer en N posts.
      Patrón de uso: fact_post_interaccion → bridge_post_hashtag → dim_hashtag.
      Al hacer el join tener en cuenta que multiplica las filas del fact por el
      número de hashtags del post.
    columns:
      - name: id_post
        data_type: varchar
        description: FK hacia fact_post_interaccion (campo id_post).
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('fact_post_interaccion')
                field: id_post

      - name: id_hashtag
        data_type: varchar
        description: FK hacia dim_hashtag.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_hashtag')
                field: id_hashtag