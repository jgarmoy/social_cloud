version: 2

models:

  - name: dim_fecha
    description: >
      Dimensión de tiempo. Generada con dbt_utils.date_spine desde 2024-01-01 hasta 2025-12-31.
      Grano: un registro por día. id_fecha es un entero YYYYMMDD usado como FK en las tres facts.
    columns:
      - name: id_fecha
        data_type: int
        description: >
          PK en formato YYYYMMDD. FK en todas las tablas de hechos.
        data_tests:
          - not_null
          - unique

      - name: fecha
        data_type: date
        description: >
          Fecha en formato date. Equivalente natural de id_fecha.
        data_tests:
          - not_null
          - unique

      - name: anio
        data_type: int
        description: >
          Año natural extraído de fecha.
        data_tests:
          - not_null

      - name: mes
        data_type: int
        description: >
          Número de mes (1-12) extraído de fecha.
        data_tests:
          - not_null

      - name: desc_mes
        data_type: varchar
        description: >
          Nombre del mes en español (Enero, Febrero, ..., Diciembre).
        data_tests:
          - not_null

      - name: dia
        data_type: int
        description: >
          Día del mes extraído de fecha.
        data_tests:
          - not_null

      - name: dia_semana
        data_type: int
        description: >
          Número de día de la semana (0 = Domingo, 6 = Sábado).
        data_tests:
          - not_null

      - name: desc_dia_semana
        data_type: varchar
        description: >
          Nombre del día de la semana en español (Lunes, Martes, ..., Domingo).
        data_tests:
          - not_null

      - name: trimestre
        data_type: int
        description: >
          Trimestre del año (1-4) extraído de fecha.
        data_tests:
          - not_null

      - name: es_fin_de_semana
        data_type: boolean
        description: >
          True si el día es sábado o domingo.
        data_tests:
          - not_null

  - name: dim_empresa
    description: >
      Historial completo de cambios de empresas (SCD Type 2). Alimentado desde snp_empresa.
      Contiene todas las versiones históricas de cada empresa con su ventana de validez.
      Filtrar es_vigente = true en Power BI para obtener la vista actual.
      El campo valido_desde corresponde a dbt_valid_from y valido_hasta a dbt_valid_to del snapshot.
    columns:
      - name: id_empresa
        data_type: varchar
        description: >
          Surrogate key generada desde empresa_id. No es única en esta tabla
          porque puede aparecer una vez por cada versión histórica del registro.
        data_tests:
          - not_null

      - name: codigo_empresa
        data_type: varchar
        description: >
          Identificador natural de la empresa (empresa_id en staging).
          No es único — aparece una vez por versión histórica.
        data_tests:
          - not_null

      - name: nombre
        data_type: varchar
        description: >
          Nombre legal o comercial de la empresa en esta versión del registro.
        data_tests:
          - not_null

      - name: id_pais
        data_type: varchar
        description: >
          FK hacia dim_pais. País de registro de la empresa en esta versión.
        data_tests:
          - not_null

      - name: pais
        data_type: varchar
        description: >
          Nombre del país desnormalizado desde dim_pais.

      - name: id_categoria_empresa
        data_type: varchar
        description: >
          FK hacia int_categoria_empresa. Sector de la empresa en esta versión.
        data_tests:
          - not_null

      - name: categoria
        data_type: varchar
        description: >
          Categoría de la empresa desnormalizada desde int_categoria_empresa.

      - name: web
        data_type: varchar
        description: >
          URL del sitio web corporativo en esta versión. Puede ser nulo.

      - name: email
        data_type: varchar
        description: >
          Email de contacto en esta versión. Puede ser nulo.

      - name: valido_desde
        data_type: timestamp_ntz
        description: >
          Inicio del período de validez de esta versión. Corresponde a dbt_valid_from del snapshot.

      - name: valido_hasta
        data_type: timestamp_ntz
        description: >
          Fin del período de validez. NULL indica que es el registro vigente.
          Corresponde a dbt_valid_to del snapshot.

      - name: es_vigente
        data_type: boolean
        description: >
          True si es la versión actualmente vigente (dbt_valid_to is null).
          Usar como filtro de página en Power BI para la vista actual.
        data_tests:
          - not_null

  - name: dim_perfil_social
    description: >
      Historial completo de cambios de perfiles sociales (SCD Type 2). Alimentado desde snp_perfil_social.
      Contiene todas las versiones históricas de cada perfil con atributos de empresa
      y red social desnormalizados. Filtrar es_vigente = true en Power BI para vista actual.
      El campo valido_desde corresponde a dbt_valid_from y valido_hasta a dbt_valid_to del snapshot.
    columns:
      - name: id_perfil_social
        data_type: varchar
        description: >
          Surrogate key generada desde username + plataforma. No es única en esta tabla
          porque puede aparecer una vez por cada versión histórica del registro.
        data_tests:
          - not_null

      - name: codigo_perfil_social
        data_type: varchar
        description: >
          Identificador natural del perfil (perfil_id en staging).
          No es único — aparece una vez por versión histórica.
        data_tests:
          - not_null

      - name: id_empresa
        data_type: varchar
        description: >
          FK hacia dim_empresa. Empresa propietaria del perfil en esta versión.
        data_tests:
          - not_null

      - name: id_red_social
        data_type: varchar
        description: >
          FK hacia int_red_social. Plataforma del perfil en esta versión.
        data_tests:
          - not_null

      - name: nombre_usuario
        data_type: varchar
        description: >
          Handle del perfil en la plataforma en esta versión. Sin el prefijo '@'.
        data_tests:
          - not_null

      - name: fecha_creacion
        data_type: date
        description: >
          Fecha de creación del perfil en la plataforma.
        data_tests:
          - not_null

      - name: activo
        data_type: boolean
        description: >
          Estado del perfil en esta versión. Un cambio a false genera una nueva versión en el snapshot.
        data_tests:
          - not_null

      - name: red_social
        data_type: varchar
        description: >
          Nombre de la red social desnormalizado desde int_red_social (Instagram, Tiktok, Youtube).

      - name: empresa_nombre
        data_type: varchar
        description: >
          Nombre de la empresa desnormalizado desde dim_empresa en esta versión.

      - name: codigo_empresa
        data_type: varchar
        description: >
          Código natural de la empresa desnormalizado desde dim_empresa.

      - name: empresa_pais
        data_type: varchar
        description: >
          País de la empresa desnormalizado desde dim_empresa en esta versión.

      - name: empresa_categoria
        data_type: varchar
        description: >
          Categoría de la empresa desnormalizada desde dim_empresa en esta versión.

      - name: valido_desde
        data_type: timestamp_ntz
        description: >
          Inicio del período de validez de esta versión. Corresponde a dbt_valid_from del snapshot.

      - name: valido_hasta
        data_type: timestamp_ntz
        description: >
          Fin del período de validez. NULL indica que es el registro vigente.
          Corresponde a dbt_valid_to del snapshot.

      - name: es_vigente
        data_type: boolean
        description: >
          True si es la versión actualmente vigente (dbt_valid_to is null).
          Usar como filtro de página en Power BI para la vista actual.
        data_tests:
          - not_null

  - name: dim_pais
    description: >
      Dimensión de países. Cubre tanto países de empresa como países de audiencia demográfica.
    columns:
      - name: id_pais
        data_type: varchar
        description: >
          Surrogate key generada desde el nombre del país.
        data_tests:
          - not_null
          - unique

      - name: nombre
        data_type: varchar
        description: >
          Nombre del país con initcap aplicado en la fuente para garantizar consistencia.
        data_tests:
          - not_null
          - unique